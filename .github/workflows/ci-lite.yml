name: CI Lite - Fast Validation

on:
  pull_request:
    branches: [main, staging]
    paths-ignore:
      - "docs/**"
      - "public/**"

jobs:
  test-lite:
    name: Fast Pytest (Lite)
    runs-on: ubuntu-latest

    if: github.event_name == 'pull_request' && startsWith(github.head_ref, 'codex/')

    steps:
      - name: Debug GitHub context
        run: |
          echo "event_name: ${{ github.event_name }}"
          echo "ref: ${{ github.ref }}"
          echo "head_ref: ${{ github.head_ref }}"
          echo "base_ref: ${{ github.base_ref }}"
          echo "actor: ${{ github.actor }}"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies (lean)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
          pip install -e .

      - name: Run Pytest (fast mode)
        run: |
          python -m pytest -q --maxfail=3 --disable-warnings
