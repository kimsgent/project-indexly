# .github/workflows/publish.yml
name: Publish (Release Only)

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build artifacts
        run: python -m build

      - name: Twine check
        run: twine check dist/*

      - name: Generate brew formula (publish)
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          python scripts/generate_brew_formula.py \
            --source dist/*.tar.gz \
            --out Formula/indexly.rb

      - name: Create PR for formula update
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: brew release ${{ github.ref_name }}"
          branch: release/brew-${{ github.ref_name }}
          base: main
          title: "chore: brew release ${{ github.ref_name }}"
          body: |
            Automated Homebrew formula update for `${{ github.ref_name }}`.
          add-paths: |
            Formula/indexly.rb
