<!-- NO CSS LINK HERE - already in baseof.html -->

<!-- Pagefind Modal HTML -->
<div id="pagefind-modal" class="pagefind-modal">
  <div class="pagefind-modal-content">
    <button id="pagefind-close" class="pagefind-close">&times;</button>
    <div id="pagefind-container"></div>
  </div>
</div>

<!-- Pagefind UI CSS (load AFTER your custom.css from baseof) -->
<link rel="stylesheet" href="{{ "/pagefind/pagefind-ui.css" | relURL }}">

<!-- Scripts -->
<script src="{{ "/pagefind/pagefind-ui.js" | relURL }}"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const modal = document.getElementById('pagefind-modal');
    const container = document.getElementById('pagefind-container');
    const openBtn = document.getElementById('open-pagefind');
    const closeBtn = document.getElementById('pagefind-close');

    if (!openBtn || !modal || !container || !closeBtn) return;

    const searchUI = new PagefindUI({
      element: "#pagefind-container",
      showSubResults: true,
      showImages: false,
      resetStyles: false
    });

    const openModal = () => {
      modal.classList.add('open');
      document.body.classList.add('modal-open');
      container.querySelector('input')?.focus();
    };

    const closeModal = () => {
      modal.classList.remove('open');
      document.body.classList.remove('modal-open');
    };

    openBtn.addEventListener('click', openModal);
    closeBtn.addEventListener('click', closeModal);
    document.addEventListener('keydown', (e) => {
      if (e.key === "Escape") closeModal();
    });
  });
</script>
