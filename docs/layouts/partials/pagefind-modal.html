<!-- Pagefind Modal HTML -->
<div id="pagefind-modal" class="pagefind-modal">
  <div class="pagefind-modal-content">
    <button id="pagefind-close" class="pagefind-close">&times;</button>
    <div id="pagefind-container"></div>
  </div>
</div>

<link rel="stylesheet" href="{{ "/pagefind/pagefind-ui.css" | relURL }}">
<script src="{{ "/pagefind/pagefind-ui.js" | relURL }}"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const modal = document.getElementById('pagefind-modal');
    const openBtn = document.getElementById('open-pagefind');
    const closeBtn = document.getElementById('pagefind-close');

    if (!modal || !openBtn || !closeBtn || typeof PagefindUI === "undefined") return;

    new PagefindUI({
      element: "#pagefind-container",
      showSubResults: true,
      showImages: false,
      resetStyles: false,
      autofocus: true,
      baseUrl: "{{ .Site.Home.RelPermalink }}"
    });

    openBtn.addEventListener('click', () => {
      modal.classList.add('open');
      document.body.classList.add('modal-open');
    });

    closeBtn.addEventListener('click', () => {
      modal.classList.remove('open');
      document.body.classList.remove('modal-open');
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === "Escape") {
        modal.classList.remove('open');
        document.body.classList.remove('modal-open');
      }
    });
  });
</script>
