{{ define "main" }}

<section class="search-page py-5" style="min-height: 70vh;">
  <div class="container text-center">

    <div class="mb-4">
      <img src="{{ "/images/logo.png" | relURL }}" alt="Indexly Logo" style="max-height: 80px;">
    </div>

    <h1 class="mb-4">Search Indexly Documentation</h1>

    <div class="search-wrapper mb-5">
      <div id="search-container"></div>
    </div>

    <div class="mt-5">
      <a href="{{ "/documentation/" | relLangURL }}" class="btn btn-primary me-2">
        Documentation Overview
      </a>
      <a href="{{ "/" | relLangURL }}" class="btn btn-outline-secondary">
        Home
      </a>
    </div>

  </div>
</section>

<link rel="stylesheet" href="{{ "pagefind/pagefind-ui.css" | relURL }}">
<script src="{{ "pagefind/pagefind-ui.js" | relURL }}"></script>
<script>
  window.addEventListener('DOMContentLoaded', () => {
    if (typeof PagefindUI === "undefined") return;

    new PagefindUI({
      element: "#search-container",
      showSubResults: true,
      showImages: false,
      resetStyles: false,
      baseUrl: "{{ .Site.Home.RelPermalink }}"
    });
  });
</script>

{{ end }}
