{{ define "main" }}

<section class="search-page py-5" style="min-height: 70vh;">
  <div class="container text-center">

    <!-- Logo Placeholder -->
    <div class="mb-4">
      <img src="/images/logo.png" alt="Indexly Logo" style="max-height: 80px;">
    </div>

    <h1 class="mb-4">Search Indexly Documentation</h1>

    <!-- Search UI -->
    <div class="search-wrapper mb-5">
	<div id="search-container"></div>
    </div>


    <!-- Navigation Options -->
    <div class="mt-5">
      <a href="{{ "/documentation/" | relLangURL }}" class="btn btn-primary me-2">
        Documentation Overview
      </a>
      <a href="{{ "/" | relLangURL }}" class="btn btn-outline-secondary">
        Home
      </a>
    </div>

  </div>
</section>

<!-- Pagefind CSS -->
<link rel="stylesheet" href="/css/pagefind-ui.css">

<!-- Pagefind Script -->
<script src="/js/pagefind-ui.js"></script>
<script>
  window.addEventListener('DOMContentLoaded', () => {
    new PagefindUI({
      element: "#search-container",
      showSubResults: true,
      showImages: false,
      resetStyles: false
    });
  });
</script>

{{ end }}
