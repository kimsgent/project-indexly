# -----------------------------
# Netlify configuration for Project Indexly
# -----------------------------

[build]
  base = "docs"
  publish = "public"
  command = "hugo -e production && npx -y pagefind@latest --site public"

[context.production.environment]
  HUGO_VERSION = "0.148.1"
  HUGO_EXTENDED = "true"

[build.environment]
  HUGO_CACHEDIR = "/tmp/hugo_cache"
  HUGO_ENVIRONMENT = "production"

# -----------------------------
# Ignore unnecessary folders for clean builds
# -----------------------------
[[ignore]]
  paths = [
    "docs/node_modules",
    "dist",
    "*.log"
  ]
